---
# Container Image Cleanup
#
# Problem: Renovate and other workloads accumulate Docker images over time,
# filling up node storage. After 2-3 months, nodes reach 70%+ disk usage.
#
# Solution: crictl rmi --prune removes unused container images (safe - keeps images
# referenced by running/stopped pods). Recovers 50-70GB per node.
#
# This CronJob runs monthly on the control-plane and logs when cleanup is due.
# See CLAUDE.md for manual cleanup commands on all nodes.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: container-image-cleanup
  namespace: kube-system
  labels:
    app.kubernetes.io/name: image-cleanup
spec:
  # Run monthly on 1st at 2:00 AM
  schedule: "0 2 1 * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default
          restartPolicy: Never

          containers:
          - name: cleanup-reminder
            image: busybox:latest
            command:
            - sh
            - -c
            - |
              echo "Container image cleanup is due on all nodes."
              echo "To clean up, run on control-plane:"
              echo ""
              echo "  ssh homelab-worker1@192.168.1.89 'sudo k3s crictl rmi --prune'"
              echo "  ssh homelab-worker2@192.168.1.68 'sudo k3s crictl rmi --prune'"
              echo "  sudo k3s crictl rmi --prune"
              echo ""
              echo "This recovers 50-70GB per node. Safe to run anytime."

            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 64Mi
