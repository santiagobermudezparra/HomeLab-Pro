apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      initContainers:
        - name: init-admin
          image: filebrowser/filebrowser:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -f /database/filebrowser.db ]; then
                /bin/filebrowser -d /database/filebrowser.db config init
                /bin/filebrowser -d /database/filebrowser.db users rm admin 2>/dev/null || true
                /bin/filebrowser -d /database/filebrowser.db users add "$FB_USERNAME" "$FB_PASSWORD" --perm.admin
                echo "Admin user $FB_USERNAME created."
              else
                echo "Database already exists, skipping init."
              fi
          envFrom:
            - secretRef:
                name: filebrowser-env-secret
          volumeMounts:
            - name: filebrowser-db
              mountPath: /database
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          args:
            - --config
            - /config/.filebrowser.json
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: filebrowser-db
              mountPath: /database
            - name: filebrowser-files
              mountPath: /srv
            - name: filebrowser-config
              mountPath: /config/.filebrowser.json
              subPath: settings.json
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: filebrowser-db
          persistentVolumeClaim:
            claimName: filebrowser-db
        - name: filebrowser-files
          persistentVolumeClaim:
            claimName: filebrowser-files
        - name: filebrowser-config
          configMap:
            name: filebrowser-config
      restartPolicy: Always
