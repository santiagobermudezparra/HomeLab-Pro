apiVersion: v1
kind: Service
metadata:
  name: pihole
spec:
  type: ClusterIP
  clusterIP: 10.43.200.53
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: pihole
