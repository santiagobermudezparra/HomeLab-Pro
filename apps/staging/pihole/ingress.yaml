apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: pihole-redirect-root
  namespace: pihole
spec:
  redirectRegex:
    regex: "^https://pihole\\.watarystack\\.org/$"
    replacement: "https://pihole.watarystack.org/admin/login"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pihole
  labels:
    app.kubernetes.io/name: pihole
  annotations:
    external-dns.alpha.kubernetes.io/hostname: pihole.watarystack.org
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: PiHole
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/icon: pi-hole.png
    gethomepage.dev/description: Network-wide ad blocking
    traefik.ingress.kubernetes.io/middleware: pihole:pihole-redirect-root
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - pihole.watarystack.org
      secretName: pihole-tls
  rules:
    - host: pihole.watarystack.org
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: pihole
                port:
                  number: 80
