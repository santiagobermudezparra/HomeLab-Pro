apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pihole
resources:
  - ../../base/pihole/
  - ingress.yaml
  - pihole-env-secret.yaml
patches:
  - patch: |
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
    target:
      kind: Deployment
      name: pihole
