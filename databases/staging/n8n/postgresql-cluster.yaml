apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgresql-cluster
  namespace: n8n
spec:
  description: "PostgreSQL cluster for n8n application"
  instances: 1

  # Enable monitoring (remove podMonitorEnabled line)
  # monitoring:
  #   enabled: true
  #   podMonitorEnabled: true

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"

  storage:
    size: 2Gi
    pvcTemplate:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi

  superuserSecret:
    name: n8n-superuser

  bootstrap:
    recovery:
      source: n8n-postgresql-cluster

  externalClusters:
    - name: n8n-postgresql-cluster
      barmanObjectStore:
        destinationPath: "s3://homelab-postgres-backup/n8n"
        endpointURL: "https://cf504e28de7836d9611b6774cdcb303e.r2.cloudflarestorage.com"
        s3Credentials:
          accessKeyId:
            name: n8n-backup-s3-secret
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: n8n-backup-s3-secret
            key: ACCESS_KEY_SECRET
        wal:
          compression: gzip
        data:
          compression: gzip

  backup:
    barmanObjectStore:
      destinationPath: "s3://homelab-postgres-backup/n8n"
      endpointURL: "https://cf504e28de7836d9611b6774cdcb303e.r2.cloudflarestorage.com"
      s3Credentials:
        accessKeyId:
          name: n8n-backup-s3-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: n8n-backup-s3-secret
          key: ACCESS_KEY_SECRET
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
