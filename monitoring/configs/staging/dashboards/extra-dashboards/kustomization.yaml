apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: traefik-grafana-dashboard
    files:
      - traefik.json=traefik-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

  - name: longhorn-grafana-dashboard
    files:
      - longhorn.json=longhorn-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

  - name: fluxcd-cluster-grafana-dashboard
    files:
      - fluxcd-cluster.json=fluxcd-cluster-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

  - name: fluxcd-control-plane-grafana-dashboard
    files:
      - fluxcd-control-plane.json=fluxcd-control-plane-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

  - name: cilium-grafana-dashboard
    files:
      - cilium.json=cilium-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
